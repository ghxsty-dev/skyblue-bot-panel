<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyBlue - Komutlar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="sidebar-brand-icon">🌊</div><div><div class="sidebar-brand-text">SkyBlue</div><div class="sidebar-brand-version">Bot Panel v1.0</div></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Ana Menü</div>
          <a href="/dashboard" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
          <a href="/commands" class="sidebar-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Komutlar</a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Yönetim</div>
          <a href="/settings" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Ayarlar</a>
          <a href="/logs" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Loglar</a>
        </div>
      </nav>
      <div class="sidebar-user" id="sidebarUser"><div class="sidebar-user-avatar" id="userAvatar"></div><div class="sidebar-user-info"><div class="sidebar-user-name" id="userName">Yükleniyor...</div><div class="sidebar-user-id" id="userId"></div></div><a href="/api/auth/logout" class="sidebar-logout" title="Çıkış Yap"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div>
    </aside>
    <main class="main-content">
      <div class="page-header fade-in">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div><h1 class="page-title">Komutlar</h1><p class="page-subtitle">Slash komutlarını yönetin ve yapılandırın</p></div>
          <a href="/commands/new" class="btn btn-primary">➕ Yeni Komut</a>
        </div>
      </div>
      <div class="card fade-in" id="commandsContainer">Yükleniyor...</div>
    </main>
  </div>
  <script>
    async function load() {
      try {
        const uRes = await fetch('/api/panel/dashboard');
        if (!uRes.ok) return window.location.href = '/';
        const uData = await uRes.json();
        document.getElementById('userName').textContent = uData.user.username;
        document.getElementById('userId').textContent = 'ID: ' + uData.user.id;
        document.getElementById('userAvatar').innerHTML = `<img src="${uData.user.avatar}" style="width:100%;height:100%;border-radius:50%;">`;
      } catch(e) { window.location.href = '/'; }
      const res = await fetch('/api/panel/commands');
      const data = await res.json();
      if (data.commands.length === 0) {
        document.getElementById('commandsContainer').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-text">Henüz komut oluşturulmamış</div><a href="/commands/new" class="btn btn-primary">İlk Komutu Oluştur</a></div>';
        return;
      }
      let html = '<div class="table-wrapper"><table><thead><tr><th>Komut</th><th>Açıklama</th><th>Tip</th><th>Durum</th><th>Cooldown</th><th>İşlemler</th></tr></thead><tbody>';
      data.commands.forEach(cmd => {
        html += `<tr>
          <td style="font-weight:600;color:var(--turkuaz);">/${cmd.name}</td>
          <td>${cmd.description || '-'}</td>
          <td><span class="badge badge-info">${cmd.response_type}</span></td>
          <td><span class="badge ${cmd.enabled ? 'badge-success' : 'badge-danger'}">${cmd.enabled ? 'Aktif' : 'Pasif'}</span></td>
          <td>${cmd.cooldown}s</td>
          <td><div style="display:flex;gap:8px;">
            <button class="btn-icon" onclick="toggleCmd(${cmd.id})" title="Toggle">${cmd.enabled ? '🔴' : '🟢'}</button>
            <a href="/commands/edit?id=${cmd.id}" class="btn-icon" title="Düzenle">✏️</a>
            <button class="btn-icon danger" onclick="deleteCmd(${cmd.id})" title="Sil">🗑️</button>
          </div></td></tr>`;
      });
      html += '</tbody></table></div>';
      document.getElementById('commandsContainer').innerHTML = html;
    }
    async function toggleCmd(id) {
      const res = await fetch('/api/panel/command', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({toggle_id: id}) });
      if (res.ok) load();
    }
    async function deleteCmd(id) {
      if (!confirm('Bu komutu silmek istediğinize emin misiniz?')) return;
      await fetch('/api/panel/command?id=' + id, { method: 'DELETE' });
      load();
    }
    load();
  </script>
</body>
</html>
