<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyBlue - Komut Düzenle</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="sidebar-brand-icon">🌊</div><div><div class="sidebar-brand-text">SkyBlue</div><div class="sidebar-brand-version">Bot Panel v1.0</div></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Ana Menü</div>
          <a href="/dashboard" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
          <a href="/commands" class="sidebar-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Komutlar</a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Yönetim</div>
          <a href="/settings" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Ayarlar</a>
          <a href="/logs" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Loglar</a>
        </div>
      </nav>
      <div class="sidebar-user" id="sidebarUser"><div class="sidebar-user-avatar" id="userAvatar"></div><div class="sidebar-user-info"><div class="sidebar-user-name" id="userName">Yükleniyor...</div><div class="sidebar-user-id" id="userId"></div></div><a href="/api/auth/logout" class="sidebar-logout" title="Çıkış Yap"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div>
    </aside>
    <main class="main-content">
      <div class="page-header fade-in">
        <div style="display: flex; align-items: center; gap: 12px;">
          <a href="/commands" class="btn-icon">←</a>
          <div><h1 class="page-title" id="pageTitle">Yeni Komut Oluştur</h1><p class="page-subtitle" id="pageSubtitle">Komutunuzu yapılandırın</p></div>
        </div>
      </div>
      <div id="errorAlert"></div>
      <form id="cmdForm" onsubmit="saveCommand(event)">
        <input type="hidden" id="cmdId" value="">
        <div class="card fade-in" style="margin-bottom: 20px;">
          <div class="card-header"><span class="card-title">📋 Temel Bilgiler</span></div>
          <div style="padding: 20px 24px;">
            <div class="form-row">
              <div class="form-group"><label class="form-label">Komut Adı</label><input type="text" id="cmdName" class="form-input" placeholder="ornegin: selam" required pattern="[a-zA-Z0-9_-]+"><div class="form-hint">Sadece harf, rakam, _ ve - kullanılabilir</div></div>
              <div class="form-group"><label class="form-label">Açıklama</label><input type="text" id="cmdDesc" class="form-input" placeholder="Komut açıklaması"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Cooldown (saniye)</label><input type="number" id="cmdCooldown" class="form-input" placeholder="0" value="0" min="0"></div>
              <div class="form-group"><label class="form-label">Gerekli Rol</label><input type="text" id="cmdRole" class="form-input" placeholder="Boş = herkes kullanabilir"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-check"><label class="toggle"><input type="checkbox" id="cmdEnabled" checked><span class="toggle-slider"></span></label><label>Aktif</label></label></div>
              <div class="form-group"><label class="form-check"><label class="toggle"><input type="checkbox" id="cmdDelete"><span class="toggle-slider"></span></label><label>Komut mesajını sil</label></label></div>
            </div>
          </div>
        </div>
        <div class="card fade-in" style="margin-bottom: 20px;">
          <div class="card-header"><span class="card-title">💬 Yanıt Ayarları</span></div>
          <div style="padding: 20px 24px;">
            <div class="form-group"><label class="form-label">Yanıt Tipi</label>
              <select id="cmdType" class="form-select" onchange="toggleEmbed()">
                <option value="text">Metin</option>
                <option value="embed">Embed (Zengin Mesaj)</option>
              </select>
            </div>
            <div id="textFields" class="form-group"><label class="form-label">Yanıt Metni</label><textarea id="cmdResponse" class="form-textarea" placeholder="Botun vereceği yanıt..."></textarea><div class="form-hint">{user} = kullanıcı, {server} = sunucu adı</div></div>
            <div id="embedFields" style="display:none;">
              <div class="form-row">
                <div class="form-group"><label class="form-label">Embed Başlık</label><input type="text" id="cmdEmbedTitle" class="form-input" placeholder="Embed başlığı"></div>
                <div class="form-group"><label class="form-label">Embed Renk</label><input type="color" id="cmdEmbedColor" class="form-input" value="#06b6d4" style="height:42px;padding:4px;"></div>
              </div>
              <div class="form-group"><label class="form-label">Embed Açıklama</label><textarea id="cmdEmbedDesc" class="form-textarea" placeholder="Embed açıklaması..."></textarea></div>
              <div class="form-group"><label class="form-label">Embed Görsel URL</label><input type="url" id="cmdEmbedImage" class="form-input" placeholder="https://..."></div>
            </div>
          </div>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
          <a href="/commands" class="btn btn-secondary">İptal</a>
          <button type="submit" class="btn btn-primary">💾 Kaydet</button>
        </div>
      </form>
    </main>
  </div>
  <script>
    let isEdit = false;
    async function init() {
      try {
        const uRes = await fetch('/api/panel/dashboard');
        if (!uRes.ok) return window.location.href = '/';
        const uData = await uRes.json();
        document.getElementById('userName').textContent = uData.user.username;
        document.getElementById('userId').textContent = 'ID: ' + uData.user.id;
        document.getElementById('userAvatar').innerHTML = `<img src="${uData.user.avatar}" style="width:100%;height:100%;border-radius:50%;">`;
      } catch(e) { window.location.href = '/'; }
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) {
        isEdit = true;
        document.getElementById('pageTitle').textContent = 'Komutu Düzenle';
        const res = await fetch('/api/panel/command?id=' + id);
        const data = await res.json();
        if (data.command) {
          const c = data.command;
          document.getElementById('cmdId').value = c.id;
          document.getElementById('cmdName').value = c.name;
          document.getElementById('cmdDesc').value = c.description || '';
          document.getElementById('cmdCooldown').value = c.cooldown || 0;
          document.getElementById('cmdRole').value = c.required_role || '';
          document.getElementById('cmdEnabled').checked = !!c.enabled;
          document.getElementById('cmdDelete').checked = !!c.delete_command;
          document.getElementById('cmdType').value = c.response_type || 'text';
          document.getElementById('cmdResponse').value = c.response || '';
          document.getElementById('cmdEmbedTitle').value = c.embed_title || '';
          document.getElementById('cmdEmbedColor').value = c.embed_color || '#06b6d4';
          document.getElementById('cmdEmbedDesc').value = c.embed_description || '';
          document.getElementById('cmdEmbedImage').value = c.embed_image || '';
          toggleEmbed();
        }
      }
    }
    function toggleEmbed() {
      const t = document.getElementById('cmdType').value;
      document.getElementById('textFields').style.display = t === 'text' ? 'block' : 'none';
      document.getElementById('embedFields').style.display = t === 'embed' ? 'block' : 'none';
    }
    async function saveCommand(e) {
      e.preventDefault();
      const body = {
        name: document.getElementById('cmdName').value,
        description: document.getElementById('cmdDesc').value,
        response: document.getElementById('cmdResponse').value,
        response_type: document.getElementById('cmdType').value,
        embed_title: document.getElementById('cmdEmbedTitle').value,
        embed_description: document.getElementById('cmdEmbedDesc').value,
        embed_color: document.getElementById('cmdEmbedColor').value,
        embed_image: document.getElementById('cmdEmbedImage').value,
        enabled: document.getElementById('cmdEnabled').checked,
        cooldown: parseInt(document.getElementById('cmdCooldown').value) || 0,
        required_role: document.getElementById('cmdRole').value,
        delete_command: document.getElementById('cmdDelete').checked,
      };
      const id = document.getElementById('cmdId').value;
      if (id) body.id = id;
      const res = await fetch('/api/panel/command', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (res.ok) { window.location.href = '/commands'; }
      else {
        const err = await res.json();
        document.getElementById('errorAlert').innerHTML = `<div class="alert alert-error">⚠️ ${err.error}</div>`;
      }
    }
    init();
  </script>
</body>
</html>
